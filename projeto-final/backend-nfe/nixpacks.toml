# Configuração Railway/Nixpacks para suporte ao Puppeteer (Chromium headless)
[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "freetype",
  "harfbuzz",
  "expat",
  "fontconfig",
  "glib",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libgbm",
  "alsa-lib",
  "cairo",
  "pango",
  "atk",
  "cups",
  "libdrm",
  "gtk3"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "false"
